<html lang="en">
<head>

  <style>
    :root {
      /* ENHANCED BACKGROUND COLORS */
      --bg-color-1: #020205;
      --bg-color-2: #0a0515; 
      --nebula-color: rgba(0, 229, 255, 0.04);
      --grid-color: rgba(0, 229, 255, 0.15);
      
      --term-bg: rgba(7, 7, 12, 0.75); 
      --text-color: #e0e0e0; 
      
      /* NEON PALETTE */
      --neon-cyan: #00e5ff;
      --neon-pink: #ff66b2;
      --neon-green: #00ff66;
      --alert-red: #ff003c;
      
      /* Active palette overrides */
      --accent-green: var(--neon-green);
      --accent-blue: var(--neon-cyan);
      --accent-pink: var(--neon-pink);

      /* DYNAMIC AUDIO BEAT VARIABLE (Controlled by JS) */
      --audio-pulse: 0;
    }

    body.theme-unlocked { 
        --nebula-color: rgba(255, 102, 178, 0.06); 
        --grid-color: rgba(255, 102, 178, 0.15);
        --accent-green: var(--neon-pink); 
    }

    body {
      background: radial-gradient(circle at center, var(--bg-color-2) 0%, var(--bg-color-1) 100%);
      color: var(--text-color); 
      font-family: 'JetBrains Mono', monospace;
      margin: 0; display: flex; justify-content: center; align-items: center;
      height: 100dvh; overflow: hidden; 
      touch-action: none; user-select: none; -webkit-user-select: none;
      perspective: 1000px; 
    }

    /* =========================================
       EXTREME PRIVACY SHIELD (BLACKOUT OVERLAY)
       ========================================= */
    #privacy-shield {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background-color: #000000; z-index: 9999999; opacity: 0; pointer-events: none;
        transition: opacity 0.05s ease; /* Instant snap to black */
        display: flex; justify-content: center; align-items: center;
    }
    #privacy-shield::after {
        content: "🔒 SECURE MODE ACTIVE";
        color: #ff003c; font-family: 'Share Tech Mono', monospace; font-size: 20px;
        letter-spacing: 5px; text-shadow: 0 0 20px #ff003c; text-align: center;
    }
    body.system-blur #privacy-shield {
        opacity: 1; pointer-events: all;
    }
    body.system-blur > *:not(#privacy-shield) {
        filter: blur(120px) grayscale(100%) brightness(0) !important;
        opacity: 0 !important;
        transition: filter 0.05s, opacity 0.05s;
    }

    /* MATRIX DIGITAL RAIN */
    #matrix-canvas {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        z-index: 0; pointer-events: none; opacity: 0.25;
    }

    /* NEBULA CLOUD EFFECT */
    .nebula {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: radial-gradient(circle at 20% 30%, var(--nebula-color) 0%, transparent 50%),
                    radial-gradient(circle at 80% 70%, var(--nebula-color) 0%, transparent 50%);
        z-index: 1; pointer-events: none; filter: blur(40px);
        animation: nebulaPulse 12s infinite alternate ease-in-out; transition: background 2s ease;
    }
    @keyframes nebulaPulse { 0% { opacity: 0.5; transform: scale(1); } 100% { opacity: 1; transform: scale(1.15); } }

    /* 3D CYBER GRID */
    .cyber-grid {
        position: fixed; bottom: -10%; left: -50%; width: 200%; height: 45vh;
        background: linear-gradient(var(--grid-color) 1px, transparent 1px),
                    linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
        background-size: 40px 40px;
        transform: perspective(600px) rotateX(70deg);
        animation: gridMove 5s linear infinite;
        z-index: 1; opacity: 0.8; pointer-events: none; transition: background 2s ease;
    }
    @keyframes gridMove { 
        0% { transform: perspective(600px) rotateX(70deg) translateY(0); } 
        100% { transform: perspective(600px) rotateX(70deg) translateY(40px); } 
    }

    /* CRT SCANLINES */
    .scanlines {
        position: fixed; top: -10%; left: -10%; width: 120vw; height: 120vh; 
        background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.15));
        background-size: 100% 4px; z-index: 998; pointer-events: none; opacity: 0.6;
    }

    /* CANVASES (WITH PARALLAX TRANSITION PREP) */
    #star-canvas, #net-canvas { 
        position: fixed; top: -10%; left: -10%; width: 120%; height: 120%; 
        z-index: 2; pointer-events: none; will-change: transform;
    }
    #net-canvas { opacity: 0.7; }

    #speed-lines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; opacity: 0; transition: opacity 2.5s ease;}
    body.theme-unlocked #speed-lines { opacity: 1; animation: focusPulse 3s infinite alternate ease-in-out; }
    @keyframes focusPulse { 0% { box-shadow: inset 0 0 50px rgba(255,102,178,0.05); } 100% { box-shadow: inset 0 0 150px rgba(255,102,178,0.15); } }

    .terminal-container {
        position: relative; z-index: 10;
        animation: entrance 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        will-change: transform;
    }

    /* AUDIO-REACTIVE GLOWING BORDER */
    .terminal-container::before {
        content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
        background: linear-gradient(45deg, var(--accent-blue), transparent 30%, transparent 70%, var(--accent-pink));
        background-size: 200% 200%; z-index: -1; border-radius: 22px;
        animation: borderRotate 6s linear infinite; 
        opacity: calc(0.5 + (var(--audio-pulse) * 0.5));
        filter: blur(calc(0px + (var(--audio-pulse) * 8px)));
        transition: all 0.1s ease;
    }
    body.theme-unlocked .terminal-container::before {
        background: linear-gradient(45deg, var(--accent-pink), transparent 30%, transparent 70%, #fff);
    }
    @keyframes borderRotate { 0% { background-position: 0% 0%; } 50% { background-position: 100% 100%; } 100% { background-position: 0% 0%; } }

    /* AUDIO-REACTIVE INNER SHADOW */
    .terminal-wrapper {
      width: 90vw; max-width: 800px; height: 80dvh;
      background: var(--term-bg); border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 30px 80px rgba(0,0,0,0.9), 
                  inset 0 0 calc(20px + (var(--audio-pulse) * 60px)) rgba(0, 229, 255, calc(0.05 + (var(--audio-pulse) * 0.2)));
      display: flex; flex-direction: column;
      backdrop-filter: blur(30px) saturate(200%); -webkit-backdrop-filter: blur(30px) saturate(200%);
      transition: box-shadow 0.1s ease;
      animation: levitate 6s ease-in-out infinite alternate;
      position: relative; overflow: hidden;
    }

    /* HOLOGRAPHIC SCANNER LINE */
    .terminal-wrapper::after {
        content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 10%;
        background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.05), transparent);
        animation: scanlineSweep 5s linear infinite; pointer-events: none; z-index: 20;
    }
    @keyframes scanlineSweep { 0% { top: -20%; } 100% { top: 120%; } }

    @keyframes levitate { 0% { transform: translateY(0px); } 100% { transform: translateY(-15px); } }

    body.theme-unlocked .terminal-wrapper {
        border: 1px solid rgba(255, 102, 178, 0.3);
        box-shadow: 0 30px 80px rgba(0,0,0,0.9), 
                    inset 0 0 calc(30px + (var(--audio-pulse) * 80px)) rgba(255, 102, 178, calc(0.1 + (var(--audio-pulse) * 0.25)));
    }

    .terminal-close-anim { animation: smoothClose 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards !important; }
    @keyframes smoothClose { 0% { transform: scale(1); filter: blur(0px); opacity: 1; } 100% { transform: scale(0.8); filter: blur(40px); opacity: 0; } }

    /* GLITCH ENTRANCE ANIMATION */
    @keyframes entrance { 
        0% { transform: scale(0.9) translateY(40px); opacity: 0; filter: contrast(2) brightness(2) hue-rotate(90deg); } 
        50% { filter: contrast(1) brightness(1) hue-rotate(0deg); }
        70% { transform: scale(1.02); }
        100% { transform: scale(1) translateY(0); opacity: 1; }

    .glow-sys { color: var(--accent-green); text-shadow: 0 0 10px var(--accent-green); font-weight: 700; }
    .glow-jec { color: var(--accent-blue); text-shadow: 0 0 12px var(--accent-blue); font-weight: 700; }
    .glow-name { color: var(--accent-pink); text-shadow: 0 0 12px var(--accent-pink); font-weight: 700;}

    /* ENHANCED WINDOW HEADER BUTTONS */
    .window-btn { width: 13px; height: 13px; border-radius: 50%; box-shadow: inset 0 2px 4px rgba(255,255,255,0.4), 0 0 10px rgba(0,0,0,0.5); }

    .terminal-body { 
        padding: 25px; 
        flex-grow: 1; overflow-y: auto; font-size: 16px; 
        line-height: 1.6; 
        scrollbar-width: none; -ms-overflow-style: none;
        word-wrap: break-word; z-index: 5; position: relative;
    }
    .terminal-body::-webkit-scrollbar { display: none; }
    
    #console-history, #active-line { display: inline; }

    /* GLOWING CURSOR */
    #cursor {
        display: inline-block; width: 10px; height: 1.2rem; background: var(--accent-green); 
        box-shadow: 0 0 10px var(--accent-green); animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 4px;
        transition: background 1.5s, box-shadow 1.5s;
    }
    body.theme-unlocked #cursor { background: var(--accent-pink); box-shadow: 0 0 10px var(--accent-pink); }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .input-row { display: flex; align-items: center; margin-top: 10px; margin-bottom: 10px; display: none; }
    .input-arrow { color: var(--accent-green); font-weight: bold; animation: pulseArrow 1.5s infinite alternate; margin-right: 12px; }
    @keyframes pulseArrow { 0% { opacity: 0.6; text-shadow: none; } 100% { opacity: 1; text-shadow: 0 0 15px var(--accent-green); } }
    
    input { 
        background: rgba(0,0,0,0.6); padding: 12px 18px; border-radius: 8px; 
        border: 1px solid rgba(255,255,255,0.1); color: #ffffff; 
        font-family: 'JetBrains Mono'; font-size: 16px; outline: none; 
        flex-grow: 1; font-weight: 700; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); transition: border 0.3s;
    }
    input:focus { border: 1px solid var(--accent-green); box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 0 15px rgba(0,255,102,0.2); }
    body.theme-unlocked input:focus { border: 1px solid var(--accent-pink); box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 0 15px rgba(255,102,178,0.2); }

    /* FINALE TEXT */
    .manga-style-text {
      font-family: 'Playfair Display', serif; 
      font-size: 30px; color: #ffb3d9; 
      text-shadow: 0 0 15px rgba(255,102,178,0.9), 0 0 30px rgba(255,102,178,0.6);
      margin-top: 25px; display: inline-block; font-style: italic; font-weight: 800;
      animation: mangaGlow 2.5s infinite alternate;
    }
    @keyframes mangaGlow {
      0% { text-shadow: 0 0 15px rgba(255,102,178,0.7); transform: scale(1); }
      100% { text-shadow: 0 0 30px rgba(255,102,178,1), 0 0 50px rgba(255,255,255,0.6); transform: scale(1.03); }
    }
    .heart-glow { color: #ff3366; animation: heartbeat 1.2s infinite; display: inline-block; }
    @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.35); } }

    /* OPERATOR SCREEN */
    #operator-screen {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: radial-gradient(circle, #2a0005 0%, #050000 100%);
        display: none; flex-direction: column; justify-content: center; align-items: center;
        z-index: 9999; overflow: hidden;
    }
    #operator-screen::before {
        content: ""; position: absolute; width: 100%; height: 5px; background: rgba(255, 0, 60, 0.5);
        animation: scanline 3s linear infinite; box-shadow: 0 0 20px var(--alert-red);
    }
    @keyframes scanline { 0% { top: 0; } 100% { top: 100%; } }
    .operator-text {
        font-family: 'Share Tech Mono', monospace; color: var(--alert-red); font-size: 24px;
        text-transform: uppercase; letter-spacing: 5px; text-align: center;
        text-shadow: 0 0 15px var(--alert-red);
        animation: glitchWarning 0.1s infinite alternate; width: 90%;
    }
    @keyframes glitchWarning { 
        0% { transform: translate(2px, 1px); opacity: 0.8; } 
        100% { transform: translate(-2px, -1px); opacity: 1; text-shadow: 0 0 25px #ff0000; } 
    }

    .lockdown-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.5s ease;}
    .lockdown-overlay.active { opacity: 1; pointer-events: all; }
    #timer { font-family: 'Share Tech Mono'; font-size: 4rem; color: #ff3b30; text-shadow: 0 0 20px #ff3b30; }

    @media (max-width: 600px) { .terminal-wrapper { width: 92vw; height: 85dvh; } .terminal-body { padding: 20px; font-size: 15px;} .operator-text { font-size: 18px; } }
  </style>
</head>

        const bgMusic = document.getElementById('bg-music');
        const favicon = document.getElementById('favicon');

        if (!historyDiv || !typingTextSpan) return;

        let step = 0; let lockdownKeys = false; let typingSpeed = 45; 

        // --- AUDIO VISUALIZER SETUP & MOBILE SAFELY UNLOCK ---
        let audioCtx, analyser, dataArray;

        let audioUnlocked = false;

        function initAudioVisualizer() {
            if(audioCtx) return;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                audioCtx = new AudioContext();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaElementSource(bgMusic);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);

                dataArray = new Uint8Array(analyser.frequencyBinCount);
            } catch(e) { console.log("Audio visualizer disabled."); }

        // Forcefully wake up audio on ANY touch/click to fix Safari/Android silent playback
        function forceUnlockAudio() {
            if (audioUnlocked) return;
            initAudioVisualizer();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => { audioUnlocked = true; });
            }
            // If the user is past step 0, ensure the music is actively playing when they tap
            if (step > 0 && bgMusic && bgMusic.paused) {
                bgMusic.play().catch(e=>{});
            }
        }
        document.body.addEventListener('click', forceUnlockAudio);
        document.body.addEventListener('touchstart', forceUnlockAudio);
        inputField.addEventListener('focus', forceUnlockAudio);

        // --- 3D PARALLAX GYRO/MOUSE SETUP ---
        let targetTiltX = 0, targetTiltY = 0;
        let currentTiltX = 0, currentTiltY = 0;

        window.addEventListener('mousemove', e => {
            targetTiltX = (e.clientX / window.innerWidth - 0.5) * 30; 
            targetTiltY = (e.clientY / window.innerHeight - 0.5) * 30;

        const _hiddenNames = ["a2F0aA==", "Y2F0aA==", "Y2F0aHlseW4gbmFjYXJpbw==", "Y2F0aHlseW4gbHVjYXMgbmFjYXJpbw==", "Y2F0aHlseW4gbC4gbmFjYXJpbw==", "amVj"];
        let validNames = [];
        try { validNames = _hiddenNames.map(n => atob(n)); } catch(e) { validNames = ["kath", "cath", "jec"]; }

        // =========================================
        // EXTREME PRIVACY LOGIC & ANTI-EXIT TRAPS
        // =========================================
        const applyBlur = () => document.body.classList.add('system-blur');
        const removeBlur = () => document.body.classList.remove('system-blur');
        
        window.addEventListener('blur', applyBlur);
        window.addEventListener('focus', removeBlur);
        document.addEventListener('visibilitychange', () => { if(document.hidden) applyBlur(); else removeBlur(); });
        window.addEventListener('pagehide', applyBlur);
        document.addEventListener('mouseleave', applyBlur);
        document.addEventListener('mouseenter', removeBlur);

        document.addEventListener('contextmenu', event => event.preventDefault());

        window.addEventListener('beforeunload', (e) => { 
            if (document.body.classList.contains('theme-unlocked')) { 
                e.preventDefault(); 
                e.returnValue = 'Please finish reading the message before leaving.'; 
            } 
        });

        window.history.pushState(null, "", window.location.href);
        window.onpopstate = function () {
            window.history.pushState(null, "", window.location.href);
            if (document.body.classList.contains('theme-unlocked')) {
                activateFullscreen(); 
            }
        };

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && document.body.classList.contains('theme-unlocked')) {
                activateFullscreen();
            }
        });

        inputField.addEventListener('focus', () => {
            setTimeout(() => {
                termBody.scrollTop = termBody.scrollHeight;
                inputContainer.scrollIntoView({ behavior: "smooth", block: "center" });
            }, 300);
        });
        window.addEventListener('resize', () => {
            if(document.activeElement === inputField) {
                termBody.scrollTop = termBody.scrollHeight;
                inputContainer.scrollIntoView({ behavior: "smooth", block: "center" });
            }
        });

        document.body.addEventListener('click', (e) => { 
            if(e.target.tagName !== "INPUT" && inputContainer.style.display === "flex") {
                inputField.focus(); 
            }
            if (document.body.classList.contains('theme-unlocked')) {
                activateFullscreen(); 
            }
        });

        function safeGetLock() { try { if (typeof window.localStorage !== 'undefined') return window.localStorage.getItem("terminalLockdownTime"); } catch(e) {} return null; }
        function safeSetLock(val) { try { if (typeof window.localStorage !== 'undefined') window.localStorage.setItem("terminalLockdownTime", val); } catch(e) {} }
        function safeClearLock() { try { if (typeof window.localStorage !== 'undefined') window.localStorage.removeItem("terminalLockdownTime"); } catch(e) {} }

        document.addEventListener('keydown', (e) => {
          if (e.ctrlKey && e.shiftKey && e.key === 'K') { safeClearLock(); location.reload(); return; }
          if (['f12', 'u', 'i', 'j', 'c', 'escape'].includes(e.key.toLowerCase()) && (e.ctrlKey || e.metaKey || e.key.toLowerCase() === 'escape')) { e.preventDefault(); activateFullscreen(); }

            const allowed = ['y', 'n', 'e', 's', 'o', 'enter', 'backspace'];
            if (!allowed.includes(e.key.toLowerCase())) e.preventDefault();
          }

        function activateFullscreen() { 
            const el = document.documentElement; 
            try { if (el.requestFullscreen) el.requestFullscreen().catch(err=>{}); else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen(); } catch (error) {}

        }

        setTimeout(() => {

            if (lock && Date.now() < parseInt(lock)) enforceLockdown(parseInt(lock));
            else typeWriter("<span class='glow-sys'>[System]</span> Please enter your authorized name or nickname: ", showInput);

        inputField.addEventListener('keypress', (e) => {

        function process(val) {
          const low = val.toLowerCase();
          if (step === 0) {
            if (validNames.includes(low)) {
              step++; 
              document.body.classList.add('theme-unlocked'); 
              activateFullscreen();
              
              if (favicon) favicon.href = "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💖</text></svg>";

              // Trigger music properly for strict browsers
              if (bgMusic) { 
                  forceUnlockAudio();
                  let playPromise = bgMusic.play(); 
                  if (playPromise !== undefined) {
                      playPromise.then(() => {
                          if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                      }).catch(error=>{ console.log("Audio waiting for user tap."); });
                  }
              }
              lockdownKeys = true; 
              setTimeout(() => typeWriter("<span class='glow-sys'>[System]</span> Identity verified. Hi <span class='glow-name'>Kath</span>, there is something I want to share with you. Proceed? (yes/no): ", showInput), 800);
            } else triggerLockdown();
          } else if (step === 1) {
            if (low === 'yes' || low === 'y') {
              step++; typeWriter("<span class='glow-sys'>[System]</span> Are you absolutely sure want to proceed, <span class='glow-name'>Kath</span>? (yes/no): ", showInput);
            } else location.reload();
          } else if (step === 2) {
            if (low === 'yes' || low === 'y') {
              step++; typeWriter("<span class='glow-jec'>[Jec]</span> Bago mo mabasa, promise mo muna na normal lang tayo pagkatapos nito ha? Payag ka ba? (yes/no): ", showInput);
            } else location.reload();
          } else if (step === 3) {
            if (low === 'yes' || low === 'y') {
              step++; sendToDiscord("Kath accepted agreement."); historyDiv.innerHTML = ""; 
              
              let introMsg = "<span class='glow-sys'>[System]</span> Reminder English word(Tagalog word)<br>";
              introMsg += " - Ex. A hello this is the example. (Hello ito ang halimbawa.)<br><br>";
              introMsg += "<span class='glow-sys'>[System]</span> Message ito ni <span class='glow-jec'>Jec</span>, <span class='glow-name'>Kath</span><br><br>";

              typeWriter(introMsg, () => { typingSpeed = 85; setTimeout(playFinal, 1500); });
            } else location.reload();
          }
        }

        async function sendToDiscord(msg) {
          const payload = { embeds: [{ title: "🛰️ SYSTEM ACCESS ALERT", description: `**Event:** ${msg}`, color: 0xff66b2, timestamp: new Date().toISOString(), footer: { text: "SECURE_HOST_7.1 | JEC-OPERATOR" } }] };
          try { await fetch(DISCORD_WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }); } catch (e) {}
        }

        function playFinal() {
          const finalLines = [
            "Actually, I've been wanting to tell you this for a long time... (Sa totoo lang, matagal ko nang gustong sabihin ito sa iyo...)",
            "I know you'll be in Grade 11 at your next school, I'm only in Grade 10. (Alam kong Grade 11 ka na sa next school mo, Grade 10 pa lang ako.)",
            "With every chat and 'hello' we say, I get to know you better. (Sa bawat chat at 'hello' na sinasabi natin, mas nakikilala kita.)",
            "I call you, I always say boy first sorry about that. (I call you, lagi kong sinasabi boy first sorry about that.)",
            "I love you ML, I want to play you a lot so I can get to know you. (I love you ML, I want to play you a lot para makilala kita.)",
            "We are the same you like anime to and manga. (Pareho tayo ng gusto mo ng anime at manga.)",
            "You're not just a person I talk to, you're someone who genuinely makes my day. (Hindi lang ikaw ang taong kausap ko, isa kang tunay na bumubuo ng araw ko.)",
            "I value every second of our conversation, especially our laughter. (Pinahahalagahan ko ang bawat segundo ng aming pag-uusap, lalo na ang aming mga tawanan.)",
            "I want to say more, I can not now I wnat to know more, That all massage only last three months (Gusto kong sabihin ang higit pa, hindi ko na ngayon wnat malaman pa, Na ang lahat ng masahe ay tatagal lamang ng tatlong buwan)",
            "<span style='color:var(--accent-pink); letter-spacing:5px;'>- - - - - - - -</span>",
            "<span class='manga-style-text'>I really like you, Good luck sa Grade 11 journey mo! <span class='heart-glow'>&hearts;</span></span>"
          ];
          
          let i = 0;
          function next() {
            if (i < finalLines.length) {
              let message = finalLines[i]; 
              typeWriter(message + "<br><br>", () => {
                if(i === finalLines.length - 1) { try { if (typeof confetti === 'function') confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); } catch(e) {} }
                i++; setTimeout(next, 3800); 
              });
            } else {
                setTimeout(() => {
                    const wrapper = document.getElementById('terminal-ui');
                    wrapper.classList.add('terminal-close-anim');
                    setTimeout(() => {
                        document.querySelector('.nebula').style.display = 'none';
                        document.querySelector('.cyber-grid').style.display = 'none';
                        const c1 = document.getElementById('star-canvas'); if(c1) c1.style.display = 'none';
                        const c2 = document.getElementById('net-canvas'); if(c2) c2.style.display = 'none';
                        const m1 = document.getElementById('matrix-canvas'); if(m1) m1.style.display = 'none';
                        document.getElementById('speed-lines').style.display = 'none';
                        wrapper.style.display = 'none';
                        document.getElementById('operator-screen').style.display = 'flex';
                        document.body.style.background = '#000000';
                    }, 1200);
                }, 6000); 
            }
          }
          next();
        }

        function typeWriter(text, cb) {
          let charIdx = 0; let currentHTML = "";
          function type() {
            if (charIdx < text.length) {
              if (text.slice(charIdx).startsWith("<")) {
                let endIdx = text.indexOf(">", charIdx) + 1;
                if (endIdx > charIdx) {
                    currentHTML += text.slice(charIdx, endIdx); charIdx = endIdx;
                    typingTextSpan.innerHTML = currentHTML; setTimeout(type, 0); return;
                }
              }
              if (text.slice(charIdx).startsWith("&")) {
                let endIdx = text.indexOf(";", charIdx) + 1;
                if (endIdx > charIdx) {
                    currentHTML += text.slice(charIdx, endIdx); charIdx = endIdx;
                    typingTextSpan.innerHTML = currentHTML; setTimeout(type, 0); return;
                }
              }
              currentHTML += text.charAt(charIdx); charIdx++;
              typingTextSpan.innerHTML = currentHTML; 
              termBody.scrollTop = termBody.scrollHeight;
              
              let delay = typingSpeed + (Math.random() * 20);
              if (charIdx > 0 && (text.charAt(charIdx - 1) === '.' || text.charAt(charIdx - 1) === ',')) delay += 150; 
              setTimeout(type, delay);
            } else {
              historyDiv.innerHTML += typingTextSpan.innerHTML; typingTextSpan.innerHTML = "";
              if (cb) cb();
            }
          }
          type();
        }

        // --- MATRIX RAIN LOGIC ---
        const matrixCanvas = document.getElementById('matrix-canvas');
        const mCtx = matrixCanvas ? matrixCanvas.getContext('2d') : null;
        let matrixDrops = [];
        const matrixFontSize = 14;

        function initMatrix() {
            if (!matrixCanvas) return;
            matrixCanvas.width = window.innerWidth;
            matrixCanvas.height = window.innerHeight;
            const columns = Math.floor(matrixCanvas.width / matrixFontSize) + 1;
            matrixDrops = [];
            for(let x = 0; x < columns; x++) matrixDrops[x] = Math.random() * -100; 
        }
        
        let matrixLastDraw = 0;
        function drawMatrix(timestamp) {
            if (!mCtx) return;
            requestAnimationFrame(drawMatrix);
            if (timestamp - matrixLastDraw < 50) return; 
            matrixLastDraw = timestamp;

            mCtx.fillStyle = "rgba(0, 0, 0, 0.15)";
            mCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);

            const unlocked = document.body.classList.contains('theme-unlocked');
            mCtx.fillStyle = unlocked ? "#ff66b2" : "#00e5ff";
            mCtx.font = matrixFontSize + "px 'JetBrains Mono', monospace";

            for(let i = 0; i < matrixDrops.length; i++) {
                const text = Math.random() > 0.5 ? "1" : "0";
                mCtx.fillText(text, i * matrixFontSize, matrixDrops[i] * matrixFontSize);
                if(matrixDrops[i] * matrixFontSize > matrixCanvas.height && Math.random() > 0.95) matrixDrops[i] = 0;
                matrixDrops[i]++;
            }
        }

        // --- INTERACTIVE CANVAS LOGIC ---
        const starCanvas = document.getElementById('star-canvas'); const sCtx = starCanvas ? starCanvas.getContext('2d') : null;
        const netCanvas = document.getElementById('net-canvas'); const nCtx = netCanvas ? netCanvas.getContext('2d') : null;
        const termContainer = document.getElementById('terminal-ui');
        let stars = []; let netNodes = []; let dust = []; let ripples = [];
        
        let mouse = { x: -1000, y: -1000 };
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
        window.addEventListener('touchend', () => { mouse.x = -1000; mouse.y = -1000; });
        window.addEventListener('mouseout', () => { mouse.x = -1000; mouse.y = -1000; });

        window.addEventListener('click', e => {
            if(e.target.tagName !== "INPUT") ripples.push({ x: e.clientX, y: e.clientY, r: 0, alpha: 1 });
        });

        function initC() {
          if (!starCanvas || !netCanvas) return;
          starCanvas.width = netCanvas.width = window.innerWidth; starCanvas.height = netCanvas.height = window.innerHeight;
          stars = []; netNodes = []; dust = []; const isMobile = window.innerWidth < 600;
          
          const numStars = isMobile ? 60 : 130; 
          for(let i=0; i<numStars; i++) stars.push({ x: Math.random()*starCanvas.width, y: Math.random()*starCanvas.height, r: Math.random()*1.2 + 0.2, z: Math.random(), t: Math.random()*Math.PI, ts: Math.random() * 0.03 + 0.01 });
          
          const numNodes = isMobile ? 30 : 70;
          for(let i=0; i<numNodes; i++) netNodes.push({ x: Math.random()*netCanvas.width, y: Math.random()*netCanvas.height, r: 1.5, dx: (Math.random() - 0.5) * 0.4, dy: (Math.random() - 0.5) * 0.4 });

          const numDust = isMobile ? 40 : 100;
          for(let i=0; i<numDust; i++) dust.push({ x: Math.random()*starCanvas.width, y: Math.random()*starCanvas.height, s: Math.random()*0.8 + 0.1, dy: Math.random()*0.5 + 0.1 });
        }
        
        function drawC() {
          if (!sCtx || !nCtx) return;
          sCtx.clearRect(0,0,starCanvas.width, starCanvas.height); nCtx.clearRect(0,0,netCanvas.width, netCanvas.height);
          
          if (analyser) {
              analyser.getByteFrequencyData(dataArray);
              let sum = 0;
              for(let i = 0; i < 8; i++) sum += dataArray[i];
              audioPulseValue = sum / (8 * 255);
              document.documentElement.style.setProperty('--audio-pulse', audioPulseValue);
          }

          currentTiltX += (targetTiltX - currentTiltX) * 0.05;
          currentTiltY += (targetTiltY - currentTiltY) * 0.05;

          if (termContainer) termContainer.style.transform = `translate(${currentTiltX * -1}px, ${currentTiltY * -1}px)`;
          starCanvas.style.transform = `translate(${currentTiltX * 0.5}px, ${currentTiltY * 0.5}px)`;
          netCanvas.style.transform = `translate(${currentTiltX * 1.2}px, ${currentTiltY * 1.2}px)`;

          const unlocked = document.body.classList.contains('theme-unlocked');
          const baseStarColor = unlocked ? [255, 102, 178] : [0, 229, 255]; 
          const baseNetColor = unlocked ? "255, 102, 178" : "0, 229, 255"; 
          
          dust.forEach(d => {
              sCtx.fillStyle = `rgba(255,255,255,0.3)`; sCtx.beginPath(); sCtx.arc(d.x, d.y, d.s, 0, Math.PI*2); sCtx.fill();
              d.y -= d.dy; if(d.y < 0) d.y = starCanvas.height;
          });

          stars.forEach(s => { 
              let twinkle = Math.sin(s.t)*0.5+0.5; let alpha = twinkle * (s.z * 0.6 + 0.2);
              sCtx.fillStyle = `rgba(${baseStarColor[0]}, ${baseStarColor[1]}, ${baseStarColor[2]}, ${alpha})`; 
              sCtx.beginPath(); sCtx.arc(s.x, s.y, (s.r * (s.z * 0.5 + 0.5)) + (audioPulseValue * 0.8), 0, Math.PI*2); sCtx.fill(); 
              s.t += s.ts; s.y -= (s.z * 0.1 + 0.02); if(s.y < -10) s.y = starCanvas.height + 10;
          });

          nCtx.lineWidth = 0.8;
          netNodes.forEach(n => {
              n.x += n.dx; n.y += n.dy; 
              if(n.x < 0 || n.x > netCanvas.width) n.dx *= -1; 
              if(n.y < 0 || n.y > netCanvas.height) n.dy *= -1;
              
              let dxMouse = mouse.x - n.x; let dyMouse = mouse.y - n.y; let distMouse = Math.sqrt(dxMouse*dxMouse + dyMouse*dyMouse);
              if (distMouse < 180) {
                  n.x += dxMouse * 0.015; n.y += dyMouse * 0.015;
                  nCtx.strokeStyle = `rgba(${baseNetColor}, ${(1 - distMouse/180) * 0.5})`;
                  nCtx.beginPath(); nCtx.moveTo(n.x, n.y); nCtx.lineTo(mouse.x, mouse.y); nCtx.stroke();
              }
              nCtx.fillStyle = `rgba(${baseNetColor}, 0.6)`; nCtx.beginPath(); nCtx.arc(n.x, n.y, n.r, 0, Math.PI*2); nCtx.fill();
          });
          
          for(let i=0; i<netNodes.length; i++) {
              for(let j=i+1; j<netNodes.length; j++) {
                  let dx = netNodes[i].x - netNodes[j].x; let dy = netNodes[i].y - netNodes[j].y; let dist = Math.sqrt(dx*dx + dy*dy);
                  if(dist < 120) {
                      let opacity = (1 - dist/120) * 0.3; nCtx.strokeStyle = `rgba(${baseNetColor}, ${opacity})`;
                      nCtx.beginPath(); nCtx.moveTo(netNodes[i].x, netNodes[i].y); nCtx.lineTo(netNodes[j].x, netNodes[j].y); nCtx.stroke();
                  }
              }
          }

          ripples.forEach((rip, index) => {
              rip.r += 3; rip.alpha -= 0.02;
              if(rip.alpha <= 0) ripples.splice(index, 1);
              else {
                  nCtx.strokeStyle = `rgba(${baseNetColor}, ${rip.alpha})`;
                  nCtx.lineWidth = 1.5; nCtx.beginPath(); nCtx.arc(rip.x, rip.y, rip.r, 0, Math.PI*2); nCtx.stroke();
              }
          });

          requestAnimationFrame(drawC);
        }
        
        initMatrix(); requestAnimationFrame(drawMatrix); window.addEventListener('resize', initMatrix);
        initC(); drawC(); window.addEventListener('resize', initC);

        function triggerLockdown() { const end = Date.now() + 18000000; safeSetLock(end); enforceLockdown(end); }
        function enforceLockdown(end) {
          hideInput(); document.getElementById('lock-screen').classList.add('active');
          const timerInterval = setInterval(() => {
            const rem = end - Date.now(); 
            if (rem <= 0) { clearInterval(timerInterval); safeClearLock(); location.reload(); return; }
            const h = Math.floor(rem / 3600000).toString().padStart(2,'0'); const m = Math.floor((rem % 3600000) / 60000).toString().padStart(2,'0'); const s = Math.floor((rem % 60000) / 1000).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `${h}:${m}:${s}`;
          }, 1000);
        }
        function showInput() { 
            inputContainer.style.display = "flex"; 
            inputField.focus(); 
            setTimeout(() => { termBody.scrollTop = termBody.scrollHeight; }, 100);
        }
        function hideInput() { inputContainer.style.display = "none"; }
    }

    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', runApp); } else { runApp(); }
  </script>
